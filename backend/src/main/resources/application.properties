spring.application.name=crypto_portfolio_tracker

# DATABASE CONFIGURATION
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/crypto_portfolio_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# SERVER CONFIGURATION
server.port=${PORT:8081}

# CORS - frontend origin
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ENCRYPTION KEY - must be exactly 32 characters
app.encryption.key=${APP_ENCRYPTION_KEY:0123456789ABCDEF0123456789ABCDEF}