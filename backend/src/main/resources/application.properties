# Server Port
server.port=${PORT:5000}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/crypto_tracker_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&sessionVariables=time_zone='%2B05:30'}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}


# SECURITY: Must be exactly 16 characters for AES-128
app.security.master-key=${MASTER_KEY:SuperSecretKey12}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:DEBUG}
logging.level.org.springframework.web=${WEB_LOG_LEVEL:DEBUG}
